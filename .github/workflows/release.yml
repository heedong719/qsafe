name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # === 64-bit ===
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
            arch_label: "linux-x86_64"
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ""
            arch_label: "macos-arm64"
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: ""
            arch_label: "macos-x86_64"
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: ".exe"
            arch_label: "windows-x86_64"
          # === 32-bit (사용자 요청, R54 추가) ===
          # macOS 32-bit: OS 차원에서 Catalina (10.15) 이후 미지원 — 대상 제외.
          - target: i686-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
            arch_label: "linux-i686"
          - target: i686-pc-windows-msvc
            os: windows-latest
            ext: ".exe"
            arch_label: "windows-i686"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux: hidapi (ctap-hid-fido2 transitive)가 libudev를 요구.
      - name: Install Linux deps (libudev for hidapi)
        if: runner.os == 'Linux' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      # 32-bit Linux: i386 멀티-arch 활성 + gcc-multilib + 32비트 libudev.
      - name: Install Linux i686 deps
        if: runner.os == 'Linux' && matrix.target == 'i686-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
            gcc-multilib \
            libudev-dev:i386 \
            pkg-config

      # Windows i686 toolchain (rustup target add 는 dtolnay/rust-toolchain 이 처리).
      # tauri-bundler 의 cargo build 가 i686 MSVC linker 를 자동 선택.

      # qsafe CLI + qsafe-stub 두 binary를 동시에 빌드한다.
      # qsafe-stub은 `qsafe pack --sfx` 출력에 prepend되므로 같은 release에 포함되어야 한다.
      - name: Build release (CLI + stub)
        run: |
          cargo build --release --target ${{ matrix.target }} -p qsafe-cli
          cargo build --release --target ${{ matrix.target }} -p qsafe-stub

      - name: Strip (Unix)
        if: runner.os != 'Windows'
        run: |
          # i686 32-bit binary 도 strip 됨 (host strip 이 ELF32 지원)
          strip target/${{ matrix.target }}/release/qsafe
          strip target/${{ matrix.target }}/release/qsafe-stub

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/qsafe${{ matrix.ext }} dist/
          cp target/${{ matrix.target }}/release/qsafe-stub${{ matrix.ext }} dist/
          cp README.md LICENSE-MIT LICENSE-APACHE NOTICE.md SECURITY.md CHANGELOG.md dist/
          cd dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a ../qsafe-${{ github.ref_name }}-${{ matrix.target }}.zip *
          else
            tar -czf ../qsafe-${{ github.ref_name }}-${{ matrix.target }}.tar.gz *
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qsafe-${{ matrix.target }}
          path: |
            qsafe-*.tar.gz
            qsafe-*.zip

  # qsafe-gui (Tauri 2) — OS-native bundles (.dmg / .msi / .nsis / .deb / .AppImage)
  # The CLI matrix above already covers headless users; this job covers double-click installers.
  # File associations + UTI / registry verbs are populated by tauri-bundler from tauri.conf.json's
  # bundle.fileAssociations declaration, so installing the .dmg / .msi auto-wires .qs to qsafe-gui.
  build-gui:
    name: Bundle GUI (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            os: macos-latest
            rust_target: aarch64-apple-darwin
            bundle_pattern: "src-tauri/target/${{ '' }}release/bundle/{dmg,macos}/*"
          - platform: macos-x64
            os: macos-13
            rust_target: x86_64-apple-darwin
            bundle_pattern: "src-tauri/target/${{ '' }}release/bundle/{dmg,macos}/*"
          - platform: windows-x86_64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            bundle_pattern: "src-tauri/target/${{ '' }}release/bundle/{msi,nsis}/*"
          - platform: linux-x86_64
            os: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            bundle_pattern: "src-tauri/target/${{ '' }}release/bundle/{deb,appimage}/*"
          # R54: 32-bit Windows GUI bundle — i686 MSVC + i686 WebView2
          # macOS GUI 32-bit: OS 미지원 (제외)
          # Linux GUI 32-bit: libwebkit2gtk-4.1-dev:i386 가 Ubuntu 22.04 에 없음 → 제외.
          - platform: windows-i686
            os: windows-latest
            rust_target: i686-pc-windows-msvc
            bundle_pattern: "src-tauri/target/${{ '' }}release/bundle/{msi,nsis}/*"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      # Linux: Tauri 2 의 WebKitGTK + libayatana-appindicator + hidapi(libudev) 의존성
      - name: Install Linux deps (webkit + appindicator + libudev)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libudev-dev \
            pkg-config \
            libssl-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build GUI bundle
        # tauri build reads tauri.conf.json (bundle.active=true) and produces the
        # platform-native installer in target/release/bundle/.
        working-directory: crates/qsafe-gui
        run: cargo tauri build --target ${{ matrix.rust_target }}

      - name: Stage bundles
        shell: bash
        run: |
          mkdir -p gui-dist
          # Tauri 2 puts bundles at target/<target>/release/bundle/<kind>/*
          for kind in dmg macos msi nsis deb appimage; do
            d="target/${{ matrix.rust_target }}/release/bundle/$kind"
            if [ -d "$d" ]; then
              find "$d" -maxdepth 1 -type f \
                \( -name "*.dmg" -o -name "*.msi" -o -name "*.exe" \
                   -o -name "*.deb" -o -name "*.AppImage" \) \
                -exec cp -v {} gui-dist/ \;
            fi
          done
          ls -la gui-dist/

      - name: Upload GUI bundle
        uses: actions/upload-artifact@v4
        with:
          name: qsafe-gui-${{ matrix.platform }}
          path: gui-dist/*

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, build-gui]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/qsafe-*.tar.gz
            artifacts/**/qsafe-*.zip
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.deb
            artifacts/**/*.AppImage
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'beta') }}

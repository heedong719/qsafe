name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux: hidapi (ctap-hid-fido2 transitive)가 libudev를 요구.
      - name: Install Linux deps (libudev for hidapi)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      # qsafe CLI + qsafe-stub 두 binary를 동시에 빌드한다.
      # qsafe-stub은 `qsafe pack --sfx` 출력에 prepend되므로 같은 release에 포함되어야 한다.
      - name: Build release (CLI + stub)
        run: |
          cargo build --release --target ${{ matrix.target }} -p qsafe-cli
          cargo build --release --target ${{ matrix.target }} -p qsafe-stub

      - name: Strip (Unix)
        if: runner.os != 'Windows'
        run: |
          strip target/${{ matrix.target }}/release/qsafe
          strip target/${{ matrix.target }}/release/qsafe-stub

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/qsafe${{ matrix.ext }} dist/
          cp target/${{ matrix.target }}/release/qsafe-stub${{ matrix.ext }} dist/
          cp README.md LICENSE-MIT LICENSE-APACHE NOTICE.md SECURITY.md CHANGELOG.md dist/
          cd dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a ../qsafe-${{ github.ref_name }}-${{ matrix.target }}.zip *
          else
            tar -czf ../qsafe-${{ github.ref_name }}-${{ matrix.target }}.tar.gz *
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qsafe-${{ matrix.target }}
          path: |
            qsafe-*.tar.gz
            qsafe-*.zip

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/qsafe-*.tar.gz
            artifacts/**/qsafe-*.zip
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'beta') }}

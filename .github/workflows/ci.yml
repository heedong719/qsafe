name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Linux 시스템 의존성:
      # - libudev: hidapi (ctap-hid-fido2 v3 의 transitive)
      # - webkit2gtk + javascriptcoregtk + libsoup: Tauri WebView (qsafe-gui)
      # macOS/Windows는 OS 내장 WebView 사용.
      - name: Install Linux deps (libudev + Tauri WebKit)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev pkg-config \
            libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (workspace, all features, fail on warnings)
        run: cargo clippy --workspace --all-features --no-deps -- -D warnings

      - name: Build
        run: cargo build --workspace --release

      - name: Test
        run: cargo test --workspace --release

  # 통합 보안/라이센스 검사 — cargo-deny가 RUSTSEC advisories + licenses + bans + sources를 모두 검사.
  # 이전 rustsec/audit-check는 중복이고 deny.toml의 ignore 리스트를 무시하므로 제거.
  deny:
    name: Cargo deny (licenses + bans + advisories + sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features
          log-level: warn

  msrv:
    name: MSRV (1.80)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.80.0
      - name: Install Linux deps (libudev + Tauri WebKit)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev pkg-config \
            libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --release

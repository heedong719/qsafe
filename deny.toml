# cargo-deny 설정 — 라이센스/취약점/금지 의존성 자동 검사
# cargo-deny 0.19+ 스키마 (deprecated 필드: vulnerability/unmaintained/yanked/notice → 자동 deny/warn)

[graph]
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# 0.19+: vulnerability/yanked/notice는 자동 deny, unmaintained 범위만 설정
unmaintained = "workspace"
# v0.1.3에서 ctap-hid-fido2 v3 / ring 0.17.14 마이그레이션 후 RUSTSEC-2025-0009이 더 이상 적용되지 않아 ignore 비움.
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "0BSD",
    "WTFPL",
    # unrar: Eugene Roshal's UnRAR License — SPDX 미존재, LicenseRef-unrar로 표현
    "LicenseRef-unrar",
    # ring: license manifest 미명시이지만 ISC + MIT + OpenSSL 조합 (수동 검토)
    "LicenseRef-ring",
]
confidence-threshold = 0.8

# unrar는 특수 라이센스 (Eugene Roshal's UnRAR License)
[[licenses.clarify]]
crate = "unrar"
expression = "LicenseRef-unrar"
license-files = []

# ring은 manifest에 license 명시 안 함 — ISC + MIT + OpenSSL 코드 혼합 (LICENSE 파일에 정의)
[[licenses.clarify]]
crate = "ring"
expression = "LicenseRef-ring"
license-files = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
